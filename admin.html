<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonGrief-Forum 🌙 Админ панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- СТИЛИ ПРЯМО ЗДЕСЬ -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #e0e0ff;
            line-height: 1.6;
            font-size: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ШАПКА */
        .header {
            background: linear-gradient(135deg, #0f0f1f, #1a1a3a);
            padding: 20px 0;
            border-bottom: 4px solid #4a4a8a;
            box-shadow: 0 0 30px rgba(74, 74, 138, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            color: #b0b0ff;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #4a4a8a;
        }

        .server-ip {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2a2a4a;
            padding: 8px 15px;
            border-radius: 30px;
            border: 2px solid #4a4a8a;
        }

        .copy-btn {
            background: #4a4a8a;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #6a6aaa;
            box-shadow: 0 0 15px #4a4a8a;
        }

        .auth {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #adminInfo {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2a2a4a;
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #4a4a8a;
        }

        .user-name {
            color: #b0b0ff;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-moon {
            background: #4a4a8a;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .btn-moon:hover {
            background: #6a6aaa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #4a4a8a;
        }

        .logout-btn:hover {
            background: #8a4a4a;
        }

        /* НАВИГАЦИЯ */
        .nav {
            background: #1a1a3a;
            padding: 15px 0;
            border-bottom: 2px solid #4a4a8a;
        }

        .nav .container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .nav-btn {
            background: none;
            border: 2px solid #4a4a8a;
            color: #b0b0ff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #4a4a8a;
            color: white;
        }

        .nav-btn.active {
            background: #4a4a8a;
            color: white;
            box-shadow: 0 0 20px #4a4a8a;
        }

        /* ИНФО ПАНЕЛЬ */
        .info-panel {
            background: #1a1a2a;
            padding: 20px 0;
            border-bottom: 2px solid #4a4a8a;
        }

        .info-items {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2a2a4a;
            padding: 12px 25px;
            border-radius: 40px;
            border: 2px solid #4a4a8a;
        }

        .info-icon {
            font-size: 20px;
        }

        .info-label {
            color: #8a8aff;
            font-size: 10px;
        }

        .info-value {
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        /* СТАТИСТИКА */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #1a1a2a;
            border: 2px solid #4a4a8a;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            font-size: 32px;
        }

        .stat-info h3 {
            color: #8a8aff;
            font-size: 10px;
            margin-bottom: 5px;
        }

        .stat-number {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        /* ВКЛАДКИ */
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: #1a1a2a;
            border: 2px solid #4a4a8a;
            color: #b0b0ff;
            padding: 15px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .tab-btn:hover {
            background: #4a4a8a;
            color: white;
        }

        .tab-btn.active {
            background: #4a4a8a;
            color: white;
            box-shadow: 0 0 20px #4a4a8a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* КОНТРОЛЫ */
        .admin-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .admin-refresh-btn {
            background: #2a2a4a;
            border: 2px solid #4a4a8a;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .admin-refresh-btn:hover {
            background: #4a4a8a;
            box-shadow: 0 0 15px #4a4a8a;
        }

        /* КАРТОЧКИ */
        .admin-card {
            background: #1a1a2a;
            border: 2px solid #4a4a8a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .admin-card:hover {
            transform: translateX(10px);
            box-shadow: -10px 10px 25px rgba(74, 74, 138, 0.3);
            border-color: #8a8aff;
        }

        .admin-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a4a8a;
        }

        .admin-card-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            font-size: 20px;
        }

        .admin-card-title h3 {
            color: #b0b0ff;
            font-size: 12px;
        }

        .admin-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: bold;
        }

        .status-new {
            background: #4a4a8a;
            color: white;
            box-shadow: 0 0 10px #4a4a8a;
        }

        .status-accepted {
            background: #4a9a7a;
            color: white;
            box-shadow: 0 0 10px #4a9a7a;
        }

        .status-rejected {
            background: #9a4a4a;
            color: white;
            box-shadow: 0 0 10px #9a4a4a;
        }

        .admin-card-body {
            margin-bottom: 15px;
        }

        .admin-card-body p {
            color: #c0c0ff;
            font-size: 10px;
            margin: 5px 0;
        }

        .admin-card-body strong {
            color: #b0b0ff;
            min-width: 80px;
            display: inline-block;
        }

        .admin-card-body a {
            color: #8a8aff;
            text-decoration: none;
        }

        .admin-card-body a:hover {
            text-decoration: underline;
        }

        .admin-card-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 2px solid #4a4a8a;
            padding-top: 15px;
        }

        .admin-action {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid;
            background: #2a2a4a;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .admin-action.accept {
            color: #4aff7a;
            border-color: #4aff7a;
        }

        .admin-action.accept:hover {
            background: #4aff7a;
            color: #1a1a3a;
            transform: scale(1.1);
        }

        .admin-action.reject {
            color: #ff4a4a;
            border-color: #ff4a4a;
        }

        .admin-action.reject:hover {
            background: #ff4a4a;
            color: #1a1a3a;
            transform: scale(1.1);
        }

        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
        }

        .modal-content {
            background: #1a1a3a;
            width: 90%;
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            border: 3px solid #4a4a8a;
            border-radius: 30px;
            position: relative;
        }

        .modal-content h2 {
            color: #b0b0ff;
            margin-bottom: 20px;
            text-align: center;
        }

        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #b0b0ff;
            transition: 0.3s;
        }

        .close:hover {
            color: white;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #8a8aff;
            font-size: 10px;
            margin-bottom: 5px;
        }

        .form-textarea {
            width: 100%;
            background: #2a2a4a;
            border: 2px solid #4a4a8a;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 11px;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #8a8aff;
            box-shadow: 0 0 15px #4a4a8a;
        }

        .action-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .submit-btn {
            flex: 1;
            background: #4a4a8a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #6a6aaa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #4a4a8a;
        }

        .cancel-btn {
            background: #8a4a4a !important;
        }

        .response-info {
            background: #2a2a4a;
            padding: 10px;
            border-radius: 10px;
            color: #b0b0ff;
            border: 2px solid #4a4a8a;
        }

        .empty-list {
            text-align: center;
            padding: 50px;
            background: #1a1a2a;
            border: 2px dashed #4a4a8a;
            border-radius: 20px;
            color: #7a7aaa;
            font-size: 11px;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .admin-tabs {
                flex-direction: column;
            }
            
            .admin-card-actions {
                flex-wrap: wrap;
            }
        }
    </style>
    
    <!-- Защита -->
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</head>
<body>
    <!-- ШАПКА -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🌙 MOONGRIEF ADMIN</h1>
                    <div class="server-ip">
                        <span>Сервер: Moongrief.aurorix.pro</span>
                        <button onclick="copyIP()" class="copy-btn">📋 КОПИРОВАТЬ IP</button>
                    </div>
                </div>
                
                <!-- АДМИН ИНФО -->
                <div class="auth" id="auth">
                    <div id="adminInfo">
                        <span id="adminName" class="user-name"></span>
                        <span id="adminRole" class="info-badge" style="background:#4a4a8a; padding:3px 10px; border-radius:20px; font-size:9px;">OWNER</span>
                        <button onclick="logout()" class="btn-moon logout-btn">
                            <span>🚪</span>
                            <span>ВЫЙТИ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- НАВИГАЦИЯ -->
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="nav-btn">🌙 ГЛАВНАЯ</a>
            <button class="nav-btn active" onclick="showAdminTab('complaints')">⚠️ ЖАЛОБЫ</button>
            <button class="nav-btn" onclick="showAdminTab('media')">📱 МЕДИА</button>
            <button class="nav-btn" onclick="showAdminTab('applications')">👮 ХЕЛПЕРЫ</button>
        </div>
    </nav>

    <!-- ИНФОРМАЦИОННАЯ ПАНЕЛЬ -->
    <div class="info-panel">
        <div class="container">
            <div class="info-items">
                <div class="info-item">
                    <span class="info-icon">👑</span>
                    <div class="info-text">
                        <span class="info-label">АДМИН</span>
                        <span class="info-value" id="adminRoleDisplay">OWNER</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <span class="info-icon">📊</span>
                    <div class="info-text">
                        <span class="info-label">ВСЕГО ЗАЯВОК</span>
                        <span class="info-value" id="totalStats">0</span>
                    </div>
                </div>

                <div class="info-item">
                    <span class="info-icon">⏳</span>
                    <div class="info-text">
                        <span class="info-label">НОВЫЕ</span>
                        <span class="info-value" id="newStats">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="main">
        <div class="container">
            <!-- СТАТИСТИКА -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-info">
                        <h3>ЖАЛОБЫ</h3>
                        <span id="statComplaints" class="stat-number">0</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📱</div>
                    <div class="stat-info">
                        <h3>МЕДИА</h3>
                        <span id="statMedia" class="stat-number">0</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">👮</div>
                    <div class="stat-info">
                        <h3>ХЕЛПЕРЫ</h3>
                        <span id="statHelpers" class="stat-number">0</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <h3>ВСЕГО</h3>
                        <span id="statTotal" class="stat-number">0</span>
                    </div>
                </div>
            </div>

            <!-- ВКЛАДКИ -->
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showAdminTab('complaints')">
                    <span class="tab-icon">⚠️</span>
                    <span class="tab-text">ЖАЛОБЫ</span>
                </button>
                <button class="tab-btn" onclick="showAdminTab('media')">
                    <span class="tab-icon">📱</span>
                    <span class="tab-text">МЕДИА</span>
                </button>
                <button class="tab-btn" onclick="showAdminTab('applications')">
                    <span class="tab-icon">👮</span>
                    <span class="tab-text">ХЕЛПЕРЫ</span>
                </button>
            </div>

            <!-- КОНТЕНТ ВКЛАДОК -->
            <div id="adminComplaints" class="tab-content active">
                <div class="admin-controls">
                    <button onclick="loadComplaints()" class="admin-refresh-btn">
                        <span>🔄</span> ОБНОВИТЬ
                    </button>
                </div>
                <div id="complaintsList" class="admin-list"></div>
            </div>
            
            <div id="adminMedia" class="tab-content">
                <div class="admin-controls">
                    <button onclick="loadMedia()" class="admin-refresh-btn">
                        <span>🔄</span> ОБНОВИТЬ
                    </button>
                </div>
                <div id="mediaList" class="admin-list"></div>
            </div>
            
            <div id="adminApplications" class="tab-content">
                <div class="admin-controls">
                    <button onclick="loadApplications()" class="admin-refresh-btn">
                        <span>🔄</span> ОБНОВИТЬ
                    </button>
                </div>
                <div id="applicationsList" class="admin-list"></div>
            </div>
        </div>
    </main>

    <!-- МОДАЛКА ОТВЕТА -->
    <div id="responseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResponseModal()">✖</span>
            <h2>📝 ОТВЕТ НА ОБРАЩЕНИЕ</h2>
            <form id="responseForm" onsubmit="sendResponse(event)" class="modal-form">
                <input type="hidden" id="responseId">
                <input type="hidden" id="responseType">
                
                <div class="form-group">
                    <label>ПОЛЬЗОВАТЕЛЬ</label>
                    <div id="responseUser" class="response-info"></div>
                </div>
                
                <div class="form-group">
                    <label>ТЕМА</label>
                    <div id="responseTopic" class="response-info"></div>
                </div>
                
                <div class="form-group">
                    <label>ТЕКСТ ОТВЕТА</label>
                    <textarea id="responseText" placeholder="ВВЕДИТЕ ТЕКСТ ОТВЕТА..." required class="form-textarea" rows="5"></textarea>
                </div>
                
                <div class="action-group">
                    <button type="submit" class="submit-btn">
                        <span class="btn-icon">📨</span>
                        <span class="btn-text">ОТПРАВИТЬ</span>
                    </button>
                    <button type="button" onclick="closeResponseModal()" class="submit-btn cancel-btn">
                        <span class="btn-icon">✖</span>
                        <span class="btn-text">ОТМЕНА</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- МОДАЛКА ПОДТВЕРЖДЕНИЯ -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h2>⚡ ПОДТВЕРЖДЕНИЕ</h2>
            <p id="confirmMessage" style="text-align: center; margin: 30px 0; color: #b0b0ff; font-size: 12px;"></p>
            <div class="action-group" style="justify-content: center;">
                <button onclick="confirmAction()" class="submit-btn" style="width: auto; min-width: 100px;">
                    <span>✓</span> ДА
                </button>
                <button onclick="closeConfirmModal()" class="submit-btn cancel-btn" style="width: auto; min-width: 100px;">
                    <span>✖</span> НЕТ
                </button>
            </div>
        </div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
