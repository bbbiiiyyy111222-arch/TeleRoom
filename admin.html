<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 MOONGRIEF - ЛУННАЯ АДМИН ПАНЕЛЬ</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ШАПКА -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🌙 MOONGRIEF ADMIN</h1>
                </div>
                <div class="auth">
                    <span id="adminName" class="moon-glow"></span>
                    <button onclick="logout()" class="btn-moon logout-btn">
                        <span>🌙</span>
                        <span>ВЫЙТИ</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- НАВИГАЦИЯ -->
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="nav-link">🌙 ГЛАВНАЯ</a>
            <a href="admin.html" class="nav-link active">🌙 АДМИН ПАНЕЛЬ</a>
        </div>
    </nav>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="main">
        <div class="container">
            <!-- СТАТИСТИКА -->
            <div class="stats">
                <div class="stat-card">
                    <h3>НОВЫЕ ЖАЛОБЫ</h3>
                    <span id="newComplaints">0</span>
                </div>
                <div class="stat-card">
                    <h3>НОВЫЕ АНКЕТЫ</h3>
                    <span id="newApplications">0</span>
                </div>
                <div class="stat-card">
                    <h3>ВСЕГО</h3>
                    <span id="total">0</span>
                </div>
            </div>

            <!-- ТАБЫ -->
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showAdminTab('complaints')">🌙 ЖАЛОБЫ</button>
                <button class="tab-btn" onclick="showAdminTab('applications')">🌙 АНКЕТЫ</button>
            </div>

            <!-- ЖАЛОБЫ -->
            <div id="adminComplaints" class="tab-content active"></div>
            
            <!-- АНКЕТЫ -->
            <div id="adminApplications" class="tab-content"></div>
        </div>
    </main>

    <!-- МОДАЛКА ОТВЕТА -->
    <div id="responseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResponseModal()">×</span>
            <h2>🌙 ОТВЕТ НА ОБРАЩЕНИЕ</h2>
            <form id="responseForm" onsubmit="sendResponse(event)">
                <input type="hidden" id="responseId">
                <input type="hidden" id="responseType">
                <textarea id="responseText" placeholder="ВВЕДИТЕ ОТВЕТ..." required class="textarea" rows="6"></textarea>
                <div class="modal-buttons">
                    <button type="submit" class="btn">🌙 ОТПРАВИТЬ</button>
                    <button type="button" onclick="closeResponseModal()" class="btn btn-gray">🌙 ОТМЕНА</button>
                </div>
            </form>
        </div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
