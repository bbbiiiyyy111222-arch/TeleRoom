<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 MoonGrief-Forum - Админ панель</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Кнопка смены устройства (только если зашли с мобильной версии) -->
    <div class="device-switch" id="deviceSwitch">
        <button onclick="showDeviceChoice()" class="device-switch-btn">
            <span>🌙</span> СМЕНИТЬ УСТРОЙСТВО <span>🌙</span>
        </button>
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">🌙 MOONGRIEF ADMIN</h1>
                <div class="auth">
                    <span id="adminName" class="moon-glow"></span>
                    <button onclick="logout()" class="btn-moon logout-btn">
                        <span>🌙</span>
                        <span>ВЫЙТИ</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="container">
            <a href="index.html" class="nav-link">🌙 ГЛАВНАЯ</a>
            <a href="admin.html" class="nav-link active">🌙 АДМИН ПАНЕЛЬ</a>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-info">
                        <h3>НОВЫЕ ЖАЛОБЫ</h3>
                        <span id="newComplaints" class="stat-number">0</span>
                    </div>
                    <div class="stat-glow"></div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📱</div>
                    <div class="stat-info">
                        <h3>МЕДИА-ЗАЯВКИ</h3>
                        <span id="newMedia" class="stat-number">0</span>
                    </div>
                    <div class="stat-glow"></div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">👮</div>
                    <div class="stat-info">
                        <h3>НОВЫЕ АНКЕТЫ</h3>
                        <span id="newApplications" class="stat-number">0</span>
                    </div>
                    <div class="stat-glow"></div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <h3>ВСЕГО</h3>
                        <span id="total" class="stat-number">0</span>
                    </div>
                    <div class="stat-glow"></div>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showAdminTab('complaints')">
                    <span class="tab-icon">⚠️</span>
                    <span class="tab-text">ЖАЛОБЫ</span>
                </button>
                <button class="tab-btn" onclick="showAdminTab('media')">
                    <span class="tab-icon">📱</span>
                    <span class="tab-text">МЕДИА</span>
                </button>
                <button class="tab-btn" onclick="showAdminTab('applications')">
                    <span class="tab-icon">👮</span>
                    <span class="tab-text">АНКЕТЫ</span>
                </button>
            </div>

            <!-- Контент вкладок -->
            <div id="adminComplaints" class="tab-content active">
                <div class="admin-controls">
                    <button class="admin-refresh-btn" onclick="loadComplaints()">
                        <span>🌙</span> ОБНОВИТЬ <span>🌙</span>
                    </button>
                </div>
                <div id="complaintsList" class="admin-list"></div>
            </div>
            
            <div id="adminMedia" class="tab-content">
                <div class="admin-controls">
                    <button class="admin-refresh-btn" onclick="loadMedia()">
                        <span>🌙</span> ОБНОВИТЬ <span>🌙</span>
                    </button>
                </div>
                <div id="mediaList" class="admin-list"></div>
            </div>
            
            <div id="adminApplications" class="tab-content">
                <div class="admin-controls">
                    <button class="admin-refresh-btn" onclick="loadApplications()">
                        <span>🌙</span> ОБНОВИТЬ <span>🌙</span>
                    </button>
                </div>
                <div id="applicationsList" class="admin-list"></div>
            </div>
        </div>
    </main>

    <!-- Модальное окно для ответа -->
    <div id="responseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResponseModal()">×</span>
            <h2>🌙 ОТВЕТ НА ОБРАЩЕНИЕ</h2>
            <form id="responseForm" onsubmit="sendResponse(event)" class="modal-form">
                <input type="hidden" id="responseId">
                <input type="hidden" id="responseType">
                
                <div class="form-group">
                    <label>👤 ПОЛЬЗОВАТЕЛЬ</label>
                    <div id="responseUser" class="response-user"></div>
                </div>
                
                <div class="form-group">
                    <label>📝 ТЕМА</label>
                    <div id="responseTopic" class="response-topic"></div>
                </div>
                
                <div class="form-group">
                    <label>💬 ВАШ ОТВЕТ</label>
                    <textarea id="responseText" placeholder="ВВЕДИТЕ ТЕКСТ ОТВЕТА..." required class="textarea" rows="6"></textarea>
                </div>
                
                <div class="action-group">
                    <button type="submit" class="submit-btn">
                        <span class="btn-icon">🌙</span>
                        <span class="btn-text">ОТПРАВИТЬ</span>
                    </button>
                    <button type="button" onclick="closeResponseModal()" class="submit-btn cancel-btn">
                        <span class="btn-icon">✗</span>
                        <span class="btn-text">ОТМЕНА</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h2>🌙 ПОДТВЕРЖДЕНИЕ</h2>
            <p id="confirmMessage" style="text-align: center; margin: 30px 0; color: #b0b0ff; font-size: 14px;"></p>
            <div class="action-group" style="justify-content: center;">
                <button onclick="confirmAction()" class="submit-btn" style="width: auto; min-width: 120px;">
                    <span class="btn-icon">✓</span>
                    <span class="btn-text">ДА</span>
                </button>
                <button onclick="closeConfirmModal()" class="submit-btn cancel-btn" style="width: auto; min-width: 120px;">
                    <span class="btn-icon">✗</span>
                    <span class="btn-text">НЕТ</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
