<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 MoonGrief - Лунная админ панель</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🌙 MoonGrief ADMIN</h1>
                </div>
                <div class="auth">
                    <span id="adminName" class="moon-glow"></span>
                    <button onclick="logout()" class="btn-moon logout-btn">
                        <span>🌙</span>
                        <span>Выйти</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Навигация -->
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="nav-link">🌙 Главная</a>
            <a href="admin.html" class="nav-link active">🌙 Админ панель</a>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="main">
        <div class="container">
            <!-- Статистика -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-info">
                        <h3>Новые жалобы</h3>
                        <span id="newComplaints" class="stat-number">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👮</div>
                    <div class="stat-info">
                        <h3>Новые анкеты</h3>
                        <span id="newApplications" class="stat-number">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <h3>Всего</h3>
                        <span id="total" class="stat-number">0</span>
                    </div>
                </div>
            </div>

            <!-- Табы -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showAdminTab('complaints')">🌙 Жалобы</button>
                <button class="tab-btn" onclick="showAdminTab('applications')">🌙 Анкеты</button>
            </div>

            <!-- Жалобы -->
            <div id="adminComplaints" class="tab-content active"></div>
            
            <!-- Анкеты -->
            <div id="adminApplications" class="tab-content"></div>
        </div>
    </main>

    <!-- Модалка ответа -->
    <div id="responseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResponseModal()">×</span>
            <h2>🌙 Ответ на обращение</h2>
            <form id="responseForm" onsubmit="sendResponse(event)" class="modal-form">
                <input type="hidden" id="responseId">
                <input type="hidden" id="responseType">
                <div class="form-group">
                    <label>💬 Ваш ответ</label>
                    <textarea id="responseText" placeholder="Введите текст ответа..." required class="textarea" rows="6"></textarea>
                </div>
                <div class="action-group" style="justify-content: center; margin-top: 20px;">
                    <button type="submit" class="submit-btn" style="width: auto; min-width: 200px;">
                        <span class="btn-icon">🌙</span>
                        <span class="btn-text">Отправить</span>
                    </button>
                    <button type="button" onclick="closeResponseModal()" class="submit-btn" style="width: auto; min-width: 200px; background: #3a2a2a; border-color: #a54a4a;">
                        <span class="btn-icon">✗</span>
                        <span class="btn-text">Отмена</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
