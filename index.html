<!DOCTYPE html>
<html>
<head>
    <title>TeleRoom</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e1621; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { background: #17212b; padding: 10px; margin: 5px 0; border-radius: 10px; max-width: 80%; }
        .my-msg { background: #2b5278; margin-left: auto; }
        .input-area { display: flex; padding: 15px; background: #17212b; }
        input { flex: 1; padding: 12px; background: #242f3d; border: none; color: white; border-radius: 5px; margin-right: 10px; }
        button { padding: 12px 20px; background: #2b5278; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input id="message" placeholder="Сообщение...">
        <button onclick="sendMsg()">→</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const username = 'User_' + Math.floor(Math.random() * 1000);
        
        function sendMsg() {
            const input = document.getElementById('message');
            if (input.value.trim()) {
                socket.emit('chatMessage', { user: username, text: input.value });
                input.value = '';
            }
        }
        
        socket.on('history', (msgs) => {
            msgs.forEach(addMessage);
        });
        
        socket.on('message', (msg) => {
            addMessage(msg);
        });
        
        function addMessage(msg) {
            const div = document.createElement('div');
            div.className = 'msg' + (msg.user === username ? ' my-msg' : '');
            div.innerHTML = `<small>${msg.user} ${msg.time}</small><br>${msg.text}`;
            document.getElementById('chat').appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        document.getElementById('message').onkeypress = (e) => {
            if (e.key === 'Enter') sendMsg();
        };
    </script>
</body>
</html>
