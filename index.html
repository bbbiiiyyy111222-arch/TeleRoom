<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleRoom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .header {
            background: #17212b;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #2b5278;
            border-bottom: 1px solid #242f3d;
        }
        
        /* Окно чата */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* Сообщение */
        .message {
            background: #17212b;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
            word-break: break-word;
        }
        
        .message.my-message {
            background: #2b5278;
            align-self: flex-end;
        }
        
        .message-info {
            font-size: 11px;
            color: #6c7883;
            margin-bottom: 4px;
        }
        
        .my-message .message-info {
            color: rgba(255,255,255,0.7);
        }
        
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        
        /* Панель ввода */
        .input-area {
            background: #17212b;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242f3d;
        }
        
        #username {
            width: 100px;
            padding: 12px;
            background: #242f3d;
            border: none;
            color: white;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px;
            background: #242f3d;
            border: none;
            color: white;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }
        
        #sendBtn {
            padding: 12px 24px;
            background: #2b5278;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        #sendBtn:hover {
            background: #3a6a9e;
        }
        
        #sendBtn:active {
            transform: scale(0.98);
        }
        
        /* Статус */
        .status {
            background: #17212b;
            padding: 5px 15px;
            font-size: 12px;
            color: #6c7883;
            text-align: center;
            border-top: 1px solid #242f3d;
        }
        
        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
            
            .input-area {
                padding: 10px;
            }
            
            #username {
                width: 80px;
                font-size: 12px;
            }
            
            #sendBtn {
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        💬 TeleRoom | Чат
    </div>
    
    <div id="chat"></div>
    
    <div class="input-area">
        <input type="text" id="username" placeholder="Имя" maxlength="20" value="User_" + Math.floor(Math.random() * 1000)>
        <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
    
    <div class="status" id="status">
        Подключение к серверу...
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Подключаемся к серверу
        const socket = io();
        let myName = '';
        
        // Генерируем случайное имя при загрузке
        window.onload = () => {
            const randomNum = Math.floor(Math.random() * 1000);
            document.getElementById('username').value = 'User_' + randomNum;
            myName = 'User_' + randomNum;
        };
        
        // Обновляем имя при изменении
        document.getElementById('username').addEventListener('input', (e) => {
            myName = e.target.value.trim() || 'Аноним';
        });
        
        // Получаем историю сообщений
        socket.on('history', (messages) => {
            document.getElementById('chat').innerHTML = '';
            messages.forEach(msg => addMessage(msg));
            document.getElementById('status').textContent = `✅ Подключено • ${messages.length} сообщений`;
        });
        
        // Получаем новое сообщение
        socket.on('message', (msg) => {
            addMessage(msg);
        });
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const username = document.getElementById('username').value.trim();
            
            if (input.value.trim()) {
                const messageData = {
                    user: username || 'Аноним',
                    text: input.value
                };
                
                socket.emit('chatMessage', messageData);
                input.value = '';
            }
        }
        
        // Добавление сообщения в чат
        function addMessage(msg) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            
            // Проверяем, наше это сообщение или нет
            const currentUser = document.getElementById('username').value.trim() || 'Аноним';
            div.className = 'message' + (msg.user === currentUser ? ' my-message' : '');
            
            div.innerHTML = `
                <div class="message-info">${msg.user} • ${msg.time}</div>
                <div class="message-text">${msg.text}</div>
            `;
            
            chat.appendChild(div);
            // Скролл вниз
            chat.scrollTop = chat.scrollHeight;
        }
        
        // Обработка кнопок
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Обработка ошибок
        socket.on('connect_error', (error) => {
            document.getElementById('status').textContent = '❌ Ошибка подключения к серверу';
        });
        
        socket.on('connect', () => {
            document.getElementById('status').textContent = '✅ Подключено к серверу';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status').textContent = '⚠️ Отключено от сервера';
        });
    </script>
</body>
</html>
