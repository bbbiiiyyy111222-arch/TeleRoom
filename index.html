<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonGrief-Forum 🌙 Minecraft сервер</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Простая защита -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <script>
        // Защита от просмотра кода (простая)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</head>
<body>
    <!-- Экран выбора устройства -->
    <div id="deviceChoice" class="device-choice">
        <div class="device-choice-content">
            <h1 class="device-title">🌙 MOONGRIEF-FORUM</h1>
            <p class="device-subtitle">ВЫБЕРИТЕ УСТРОЙСТВО</p>
            
            <div class="device-buttons">
                <button onclick="selectDevice('pc')" class="device-btn">
                    <span class="device-icon">🖥️</span>
                    <span class="device-name">ПК</span>
                </button>
                <button onclick="selectDevice('mobile')" class="device-btn">
                    <span class="device-icon">📱</span>
                    <span class="device-name">ТЕЛЕФОН</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Основной сайт -->
    <div id="mainSite" style="display: none;">
        <!-- Шапка -->
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <h1>🌙 MOONGRIEF-FORUM</h1>
                        <div class="server-ip">
                            <span>Сервер: Moongrief.aurorix.pro</span>
                            <button onclick="copyIP()" class="copy-btn">📋 КОПИРОВАТЬ IP</button>
                        </div>
                    </div>
                    
                    <!-- Авторизация -->
                    <div class="auth" id="auth">
                        <div id="userInfo" style="display: none;">
                            <span id="currentUser" class="moon-glow"></span>
                            <button onclick="showChangePassword()" class="btn-moon">🔑 СМЕНИТЬ ПАРОЛЬ</button>
                            <button onclick="logout()" class="btn-moon logout-btn">🚪 ВЫЙТИ</button>
                        </div>
                        <div id="loginForm" class="login-form">
                            <input type="text" id="username" placeholder="НИК" class="moon-input">
                            <input type="password" id="password" placeholder="ПАРОЛЬ" class="moon-input">
                            <button onclick="login()" class="btn-moon">🔐 ВОЙТИ</button>
                            <button onclick="showRegister()" class="btn-moon">📝 РЕГИСТРАЦИЯ</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Кнопка смены устройства -->
        <div class="device-switch" id="deviceSwitch" style="display: none;">
            <button onclick="showDeviceChoice()" class="device-switch-btn">
                📱 СМЕНИТЬ УСТРОЙСТВО 🖥️
            </button>
        </div>

        <!-- Навигация -->
        <nav class="nav">
            <div class="container">
                <a href="#rules" class="nav-link active" onclick="showSection('rules', event)">ПРАВИЛА</a>
                <a href="#complaints" class="nav-link" onclick="showSection('complaints', event)">⚠️ ЖАЛОБЫ</a>
                <a href="#media" class="nav-link" onclick="showSection('media', event)">📱 МЕДИА</a>
                <a href="#applications" class="nav-link" onclick="showSection('applications', event)">👮 ХЕЛПЕРЫ</a>
                <a href="admin.html" id="adminLink" class="nav-link" style="display: none;">⚡ АДМИН</a>
            </div>
        </nav>

        <!-- Информационная панель -->
        <div class="info-bar">
            <div class="container">
                <div class="info-content">
                    <div class="info-item">
                        <span class="info-icon">👑</span>
                        <span class="info-label">КУРАТОР:</span>
                        <a href="https://t.me/milo4ika1" target="_blank" class="info-link">@milo4ika1</a>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">⏳</span>
                        <span class="info-label">СРОК:</span>
                        <span class="info-value">24 ЧАСА</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">🐛</span>
                        <span class="info-label">БАГ:</span>
                        <a href="https://t.me/milo4ika1" target="_blank" class="info-link">@milo4ika1</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Остальной контент (сократил для читаемости) -->
        <main class="main">
            <div class="container">
                <!-- Правила, жалобы, медиа, хелперы - такой же как был -->
            </div>
        </main>

        <!-- Модалки -->
        <div id="registerModal" class="modal">...</div>
        <div id="changePasswordModal" class="modal">...</div>
    </div>

    <script src="script.js"></script>
    <script src="db.js"></script>
</body>
</html>
