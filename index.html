<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Forum</title>
</head>
<body>
    <h1>Minecraft Forum</h1>
    <p>Server is running!</p>
    <div id="status">Checking API...</div>
    
    <script>
        fetch('/api/test')
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerHTML = 
                    '✅ API работает: ' + JSON.stringify(data);
            })
            .catch(err => {
                document.getElementById('status').innerHTML = 
                    '❌ Ошибка API: ' + err;
            });
    </script>
</body>
</html>
